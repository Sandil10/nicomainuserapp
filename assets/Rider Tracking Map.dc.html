<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 470, &quot;height&quot;: 924},
  &quot;driveSeconds&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 7, &quot;min&quot;: 4, &quot;max&quot;: 14, &quot;step&quot;: 1, &quot;tsType&quot;: &quot;number&quot;, &quot;unit&quot;: &quot;s&quot;, &quot;section&quot;: &quot;Simulation&quot;},
  &quot;vehicleType&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Bike&quot;, &quot;options&quot;: [&quot;Bike&quot;, &quot;Car&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Simulation&quot;},
  &quot;showRadar&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Simulation&quot;}
}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.fullPathRef = React.createRef();
    this.seg1PathRef = React.createRef();
    this._stopped = false;
    this.state = {
      phase: 'preparing',
      t: 0,
      etaMin: 9,
      totalLen: 0,
      restaurantLen: 0,
    };
  }

  componentDidMount() {
    this._measureUntilReady();
    this._cycle();
  }

  _measureUntilReady(attempts) {
    attempts = attempts || 0;
    if (this._stopped) return;
    const full = this.fullPathRef.current;
    const seg1 = this.seg1PathRef.current;
    if (full && seg1) {
      const totalLen = full.getTotalLength();
      const restaurantLen = seg1.getTotalLength();
      if (totalLen > 0) {
        this.setState({ totalLen, restaurantLen });
        return;
      }
    }
    if (attempts < 60) {
      this._measureTimer = setTimeout(() => this._measureUntilReady(attempts + 1), 50);
    }
  }

  componentWillUnmount() {
    this._stopped = true;
    if (this._raf) cancelAnimationFrame(this._raf);
    if (this._timer) clearTimeout(this._timer);
    if (this._measureTimer) clearTimeout(this._measureTimer);
  }

  _cycle() {
    if (this._stopped) return;
    this.setState({ phase: 'preparing', t: 0 });
    this._timer = setTimeout(() => {
      if (this._stopped) return;
      this.setState({ phase: 'finding' });
      this._timer = setTimeout(() => {
        if (this._stopped) return;
        this.setState({ phase: 'picked_up' });
        this._timer = setTimeout(() => {
          if (this._stopped) return;
          this._drive();
        }, 1200);
      }, 2200);
    }, 2000);
  }

  _drive() {
    this.setState({ phase: 'on_the_way' });
    const seconds = this.props.driveSeconds ?? 7;
    const start = performance.now();
    const step = (now) => {
      if (this._stopped) return;
      const t = Math.min(1, (now - start) / (seconds * 1000));
      const etaMin = Math.max(0, Math.round((1 - t) * 9));
      this.setState({ t, etaMin });
      if (t < 1) {
        this._raf = requestAnimationFrame(step);
      } else {
        this._timer = setTimeout(() => {
          if (this._stopped) return;
          this.setState({ phase: 'delivered' });
          this._timer = setTimeout(() => this._cycle(), 2800);
        }, 300);
      }
    };
    this._raf = requestAnimationFrame(step);
  }

  renderVals() {
    const { phase, t, totalLen, restaurantLen } = this.state;
    const isPreparing = phase === 'preparing';
    const isFinding = phase === 'finding';
    const isPickedUp = phase === 'picked_up';
    const isOnWay = phase === 'on_the_way';
    const isDelivered = phase === 'delivered';

    const destX = 90, destY = 430;
    const restaurantX = 295, restaurantY = 175;

    let progressLen = 0;
    if (isPickedUp) progressLen = restaurantLen;
    else if (isOnWay) progressLen = restaurantLen + t * Math.max(0, totalLen - restaurantLen);
    else if (isDelivered) progressLen = totalLen;

    const showRider = isPickedUp || isOnWay || isDelivered;
    let riderX = restaurantX, riderY = restaurantY, riderAngle = 0;
    if (showRider) {
      const full = this.fullPathRef.current;
      if (full && totalLen) {
        const clamped = Math.min(totalLen, Math.max(0, progressLen));
        const p = full.getPointAtLength(clamped);
        const p2 = full.getPointAtLength(Math.min(totalLen, clamped + 2));
        riderX = p.x; riderY = p.y;
        riderAngle = Math.atan2(p2.y - p.y, p2.x - p.x) * 180 / Math.PI + 90;
      } else if (isDelivered) {
        riderX = destX; riderY = destY;
      }
    }

    const dashArray = totalLen || 1;
    const dashOffset = totalLen ? Math.max(0, totalLen - progressLen) : dashArray;

    const vehicle = this.props.vehicleType ?? 'Bike';
    const riderIconName = vehicle === 'Car' ? 'car-sport' : 'bicycle';
    const riderVehicleLabel = vehicle === 'Car' ? 'Car \u2022 WP CAB-4521' : 'Bike \u2022 WP CAB-4521';

    let statusTitle = 'Preparing your order';
    let statusSubtitle = 'The kitchen just started cooking';
    let etaLabel = '\u2014';
    if (isFinding) {
      statusTitle = 'Finding rider';
      statusSubtitle = 'Matching you with a nearby rider';
    } else if (isPickedUp) {
      statusTitle = 'Rider picked up your order';
      statusSubtitle = 'Heading your way shortly';
      etaLabel = '9 MIN';
    } else if (isOnWay) {
      statusTitle = 'Almost here!';
      statusSubtitle = 'Rider is on the way to you';
      etaLabel = (this.state.etaMin <= 0 ? '<1' : this.state.etaMin) + ' MIN';
    } else if (isDelivered) {
      statusTitle = 'Delivered!';
      statusSubtitle = 'Enjoy your order';
      etaLabel = '0 MIN';
    }

    return {
      isPreparing, isFinding, isPickedUp, isOnWay, isDelivered,
      isSearching: isFinding,
      showRadarRings: isFinding && (this.props.showRadar ?? true),
      showRider,
      showRiderCard: isPickedUp || isOnWay || isDelivered,
      riderLeftPx: riderX + 'px',
      riderTopPx: riderY + 'px',
      riderRotationDeg: riderAngle,
      riderIconName,
      riderName: 'Kasun Perera',
      riderRating: '4.9',
      riderVehicleLabel,
      pathDashArray: dashArray,
      pathDashOffset: dashOffset,
      statusTitle, statusSubtitle, etaLabel,
      seg1Done: !isPreparing,
      seg1Active: isPreparing,
      seg2Done: !isPreparing && !isFinding,
      seg2Active: isFinding,
      seg3Done: isDelivered,
      seg3Active: isOnWay,
      seg3FillPct: Math.round(t * 100),
      fullPathRef: this.fullPathRef,
      seg1PathRef: this.seg1PathRef,
    };
  }
}
</script>
