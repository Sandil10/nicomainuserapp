# Codemagic CI/CD — build the Nico Mart iOS app and ship it to TestFlight.
#
# One-time setup in the Codemagic UI (https://codemagic.io) before the first run:
#
# 1. Connect this Git repository as a Codemagic app.
#
# 2. App Store Connect API key (for signing + TestFlight upload):
#    Codemagic → Teams/Integrations → Apple Developer Portal → connect an
#    App Store Connect API key (Issuer ID + Key ID + .p8). Then in this
#    workflow it is referenced by the integration name below
#    (`app_store_connect`). Create the key at:
#    App Store Connect → Users and Access → Integrations → App Store Connect API.
#
# 3. Register the bundle id `com.nicomart.app` in your Apple Developer account
#    and create the matching app record in App Store Connect (same bundle id)
#    BEFORE the first TestFlight upload, or the publish step will fail.
#
# 4. Firebase iOS config file (your app uses Firebase, and the plist is not in
#    the repo). Upload `GoogleService-Info.plist` as an *environment variable
#    file*: Codemagic → this app → Environment variables →
#      - Variable name: GOOGLE_SERVICE_INFO_PLIST
#      - Value: paste the base64 of the file  (see the pre-build script below)
#      - Group:  firebase   (secure)
#    The pre-build script decodes it into ios/Runner/ at build time.
#
# 5. In `publishing.email` below, put the address(es) that should be notified.

workflows:
  ios-testflight:
    name: Nico Mart iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: app_store_connect   # <- name of your connected API key

    # Cache slow-to-rebuild artifacts across builds. Cuts the "Build IPA" and
    # "Install CocoaPods" steps dramatically (native SDKs — Firebase, Stripe,
    # Google Maps — otherwise recompile from scratch every run).
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.pub-cache
        - $CM_BUILD_DIR/ios/Pods
        - $HOME/Library/Developer/Xcode/DerivedData

    environment:
      groups:
        - firebase            # provides GOOGLE_SERVICE_INFO_PLIST (see step 4)
      # NOTE: no `ios_signing:` block here on purpose. That built-in block only
      # *fetches* existing profiles and fails with "No matching profiles found"
      # on a first build. Instead the "Fetch or create signing files" script
      # below creates the cert + profile automatically with `--create`.
      vars:
        BUNDLE_ID: "com.nicomart.app"
      flutter: 3.35.4            # match the project's Flutter version
      xcode: latest
      cocoapods: default

    scripts:
      - name: Restore Firebase iOS config
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
            echo "GoogleService-Info.plist restored."
          else
            echo "WARNING: GOOGLE_SERVICE_INFO_PLIST not set — Firebase may fail at runtime."
          fi

      - name: Flutter pub get
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Set up keychain and signing files (auto-provision)
        script: |
          set -e
          # 1. Fresh keychain on the build machine.
          keychain initialize

          # 2. Generate a private key we control, then create + fetch the
          #    distribution cert and App Store profile bound to it.
          #    NOTE: Apple allows only ~2 distribution certificates. If this
          #    step fails with 409 "You already have a current Distribution
          #    certificate", revoke old distribution certs at
          #    https://developer.apple.com/account/resources/certificates/list
          #    (keep at most one), then re-run the build.
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create

          # 3. Install the cert (with its private key) into the keychain and
          #    wire the profiles into the Xcode project.
          keychain add-certificates
          xcode-project use-profiles

          # --- Diagnostics: prove a profile was actually installed ---
          echo "----- installed provisioning profiles -----"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || \
            echo "NO PROFILE DIRECTORY."
          echo "-------------------------------------------"

      - name: Build pre-signed IPA
        script: |
          set -e
          # Build the Flutter bundle WITHOUT letting Flutter sign it.
          flutter build ios --release --no-codesign \
            --build-number=$PROJECT_BUILD_NUMBER

          # Let xcode-project export using the profiles use-profiles installed.
          # It reads them from the standard location and generates matching
          # export options automatically — no manual path juggling.
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa
      - "*.ipa"
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Optional: auto-distribute to a tester group once processed.
        # beta_groups:
        #   - Internal Testers
      email:
        recipients:
          - sandildilmith12@gmail.com   # change / add testers as needed
        notify:
          success: true
          failure: true
