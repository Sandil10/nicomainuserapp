name: new_nico_mart
description: Nico Mart — online marketplace and food delivery app.

publish_to: 'none'

version: 1.3.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

flutter_native_splash:
  color: "#4A22A8"
  image: assets/splash_logo.png
  android: true
  ios: true
  android_disable_fullscreen: true
 
  
dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.5
  image_picker: ^1.2.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  whatsapp_unilink: ^2.1.0
  google_fonts: ^6.3.0
  flutter_svg: ^2.2.0
  intl: ^0.20.2  
  provider: ^6.1.2
  lottie: ^3.1.1
  # Firebase Dependencies (stable resolvable versions)
  firebase_core: ^3.15.2
  cloud_firestore: ^5.0.3
  firebase_auth: ^5.2.2
  firebase_storage: 12.4.10  # Add this line
  smooth_page_indicator: ^1.1.0 
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  shimmer_animation: ^2.2.2
  connectivity_plus: ^6.1.0
  internet_connection_checker_plus: ^2.5.2
  
  # Social Login Dependencies
  google_sign_in: ^6.3.0
  google_sign_in_android: ^6.1.21
  flutter_facebook_auth: ^7.1.2
  overlay_support: ^2.1.0
  # Payment Dependencies
  flutter_paypal_payment: ^1.0.8
  flutter_stripe: ^11.5.0
  http: ^1.5.0
  intl_phone_field: ^3.2.0
  cloud_functions: 5.6.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  change_app_package_name: ^1.5.0
  share_plus: ^12.0.1
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/google_logo.svg
    - assets/icon.png
    - assets/splash_logo.png
